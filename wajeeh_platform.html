<!DOCTYPE html><html lang="ar" dir="rtl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>منصة وجيه | النظام المتكامل</title>    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">    <style>        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }        body {            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);            display: flex;            justify-content: center;            align-items: center;            min-height: 100vh;            margin: 0;            color: #333;        }        .container {            background: #fff;            padding: 30px;            border-radius: 20px;            box-shadow: 0 15px 35px rgba(0,0,0,0.2);            width: 100%;            max-width: 400px;            text-align: center;            transition: 0.3s;        }        h2 { color: #2a5298; margin-bottom: 20px; }        input {            width: 100%;            padding: 12px;            margin: 10px 0;            border: 2px solid #eee;            border-radius: 10px;            outline: none;        }        input:focus { border-color: #2a5298; }        .btn {            width: 100%;            padding: 12px;            border: none;            border-radius: 10px;            cursor: pointer;            font-weight: bold;            font-size: 16px;            margin-top: 10px;            transition: 0.3s;        }        .btn-primary { background: #2a5298; color: white; }        .btn-primary:hover { background: #1e3c72; transform: scale(1.02); }        .toggle-link { margin-top: 15px; font-size: 14px; color: #666; }        .toggle-link span { color: #2a5298; cursor: pointer; font-weight: bold; }        /* تنسيق لوحة التحكم */        #dashboard { display: none; max-width: 600px; }        .stat-card {            background: #f8f9fa;            border-right: 5px solid #2ecc71;            padding: 15px;            margin: 15px 0;            text-align: right;            border-radius: 10px;        }        .service-grid {            display: grid;            grid-template-columns: 1 white 1fr;            gap: 10px;            margin-top: 20px;        }        .service-item {            background: #eef2f7;            padding: 15px;            border-radius: 10px;            font-size: 14px;            font-weight: bold;        }    </style></head><body>    <div id="login-page" class="container">        <h2>مرحباً بك في موقع وجيه</h2>        <p style="font-size: 13px; color: #888;">سجل دخولك للوصول للخدمات</p>        <input type="text" id="login-user" placeholder="اسم المستخدم">        <input type="password" id="login-pass" placeholder="كلمة المرور">        <button class="btn btn-primary" onclick="handleLogin()">دخول للمنصة</button>        <div class="toggle-link">            ليس لديك حساب؟ <span onclick="showPage('register-page')">أنشئ حساباً</span>        </div>    </div>    <div id="register-page" class="container" style="display: none;">        <h2>انضم إلينا</h2>        <input type="text" placeholder="الاسم الكامل">        <input type="email" placeholder="البريد الإلكتروني">        <input type="password" placeholder="كلمة مرور جديدة">        <button class="btn btn-primary" onclick="alert('تم إنشاء الحساب بنجاح! سجل دخولك الآن.')">تسجيل</button>        <div class="toggle-link">            لديك حساب بالفعل؟ <span onclick="showPage('login-page')">سجل دخولك</span>        </div>    </div>    <div id="dashboard" class="container">        <h2>لوحة تحكم وجيه 🚀</h2>        <p>أهلاً بك، <b id="user-display"></b></p>                <div class="stat-card">            <div>رصيدك الحالي: <b>$0.00</b></div>        </div>        <div class="service-grid">            <div class="service-item">تفعيل Nashare V2</div>            <div class="service-item">شحن Almango Cash</div>            <div class="service-item">بوتات Telegram</div>            <div class="service-item">الدعم الفني</div>        </div>        <button class="btn" style="background: #e74c3c; color: white;" onclick="location.reload()">تسجيل خروج</button>    </div>    <script>        // وظيفة التنقل بين الصفحات        function showPage(pageId) {            document.getElementById('login-page').style.display = 'none';            document.getElementById('register-page').style.display = 'none';            document.getElementById('dashboard').style.display = 'none';            document.getElementById(pageId).style.display = 'block';        }        // وظيفة تسجيل الدخول        function handleLogin() {            const user = document.getElementById('login-user').value;            const pass = document.getElementById('login-pass').value;            // شرط تجريبي (تقدر تغيره)            if (user === "wajeeh" && pass === "123") {                document.getElementById('user-display').innerText = user;                showPage('dashboard');            } else if (user === "" || pass === "") {                alert("يرجى ملء كافة الحقول");            } else {                alert("بيانات الدخول غير صحيحة! (جرب wajeeh و 123)");            }        }    </script></body></html>
